name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint and build package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Run ruff
        run: uvx ruff check src tests

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

  fast-tests:
    name: Fast tests
    runs-on: macos-14
    timeout-minutes: 45
    env:
      MFLUX_PRESERVE_TEST_OUTPUT: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Run fast tests
        run: uv run --extra dev pytest -m fast -v
