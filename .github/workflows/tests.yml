name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint and build package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Run ruff
        run: uvx ruff check src tests

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

  fast-tests:
    name: Tests (no-weights band)
    runs-on: macos-14
    timeout-minutes: 45
    env:
      MFLUX_PRESERVE_TEST_OUTPUT: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install ffmpeg
        # Absent on macos-14 runners; without it the audio copy-through contract silently skips.
        run: brew install ffmpeg

      - name: Run no-weights test band
        # Run every test that does not need model weights or high memory. Marker-only bands
        # silently skip unmarked tests, which shipped a red test at the v0.18.25 tag.
        run: uv run --extra dev pytest -m "not slow and not high_memory_requirement" -v
