name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to validate or publish. Must match pyproject.toml."
        required: true
        type: string
      publish:
        description: "Publish to PyPI using trusted publishing."
        required: true
        type: boolean
        default: false
      publish_confirmation:
        description: "Required when publish=true: publish-mlx-gen-<version>"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests (no-weights band)
    runs-on: macos-14
    timeout-minutes: 45
    env:
      MFLUX_PRESERVE_TEST_OUTPUT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install ffmpeg
        # Absent on macos-14 runners; without it the audio copy-through contract silently skips.
        run: brew install ffmpeg

      - name: Run no-weights test band
        # Release gate runs the full no-weights band so unmarked contract tests gate tags too.
        run: uv run --extra dev pytest -m "not slow and not high_memory_requirement" -v

  lint-build:
    name: Lint and build package
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 20
    outputs:
      version: ${{ steps.release-meta.outputs.version }}
      should_publish: ${{ steps.release-meta.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Run ruff
        run: uvx ruff check src tests

      - id: release-meta
        name: Validate release metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISH: ${{ inputs.publish }}
          INPUT_CONFIRMATION: ${{ inputs.publish_confirmation }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import sys
          import tomllib
          import urllib.error
          import urllib.request

          package_name = "mlx-gen"
          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          project = pyproject["project"]
          version = project["version"]
          if project["name"] != package_name:
              raise SystemExit(f"Expected package name {package_name!r}, got {project['name']!r}")

          event_name = os.environ["GITHUB_EVENT_NAME"]
          ref_type = os.environ["GITHUB_REF_TYPE"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          input_version = os.environ.get("INPUT_VERSION") or version
          input_publish = os.environ.get("INPUT_PUBLISH") == "true"
          confirmation = os.environ.get("INPUT_CONFIRMATION") or ""

          if input_version != version:
              raise SystemExit(f"Input version {input_version!r} does not match pyproject.toml version {version!r}")

          expected_tag = f"v{version}"
          if ref_type == "tag" and ref_name != expected_tag:
              raise SystemExit(f"Tag {ref_name!r} does not match expected tag {expected_tag!r}")

          changelog = Path("CHANGELOG.md").read_text()
          if f"## [{version}]" not in changelog:
              raise SystemExit(f"CHANGELOG.md is missing a release entry for {version}")

          should_publish = (event_name == "push" and ref_type == "tag") or input_publish
          expected_confirmation = f"publish-{package_name}-{version}"
          if input_publish and confirmation != expected_confirmation:
              raise SystemExit(
                  f"publish=true requires publish_confirmation={expected_confirmation!r}"
              )

          release_url = f"https://pypi.org/pypi/{package_name}/{version}/json"
          version_exists = False
          try:
              with urllib.request.urlopen(release_url, timeout=15) as response:
                  json.load(response)
                  version_exists = True
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          if should_publish and version_exists:
              raise SystemExit(f"{package_name}=={version} already exists on PyPI")

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
              print(f"version={version}", file=output)
              print(f"should_publish={str(should_publish).lower()}", file=output)

          print(f"Package: {package_name}")
          print(f"Version: {version}")
          print(f"Should publish: {should_publish}")
          print(f"PyPI version already exists: {version_exists}")
          PY

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  publish-github:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [lint-build, publish-pypi]
    if: needs.lint-build.outputs.should_publish == 'true' && needs.publish-pypi.result == 'success'
    environment:
      name: github-release
      url: https://github.com/lpalbou/mlx-gen/releases
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      # Keep the release publish step independent from JavaScript action runtime migrations.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.lint-build.outputs.version }}
          TARGET_COMMITISH: ${{ github.sha }}
        run: |
          set -euo pipefail

          tag="v${RELEASE_VERSION}"
          title="mlx-gen ${RELEASE_VERSION}"

          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --repo "$GH_REPO" --clobber
            gh release edit "$tag" --repo "$GH_REPO" --title "$title"
          else
            gh release create "$tag" dist/* \
              --repo "$GH_REPO" \
              --title "$title" \
              --target "$TARGET_COMMITISH" \
              --generate-notes
          fi

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint-build]
    if: needs.lint-build.outputs.should_publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/project/mlx-gen/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
